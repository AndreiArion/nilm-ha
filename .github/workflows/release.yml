name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp manifest version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/nilm/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/nilm/manifest.json

      - name: Build zip (HACS zip_release asset)
        run: |
          cd custom_components/nilm
          zip -r ../../nilm.zip .

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" nilm.zip --clobber
